# .github/workflows/docs.yml
#
# Builds and publishes the MkDocs documentation to GitHub Pages.
#
# Triggers:
#   - Push to main       → deploys as the "latest" alias (dev docs)
#   - Push of a v* tag   → deploys as a versioned release (e.g. "2.7.0")
#                          and updates the "stable" alias to point to it
#
# The site is published to: https://pcachim.github.io/plotviz/
# Versioning is handled by `mike` (configured in mkdocs.yml).
#
# ── First-time setup ──────────────────────────────────────────────────────────
# Enable GitHub Pages for your repo:
#   Settings → Pages → Source → Deploy from a branch → gh-pages → / (root)

name: Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

# Only one deployment can run at a time.
# A second run triggered while one is in progress will wait (not cancel),
# preventing gh-pages push conflicts when a tag and main push land together.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write   # needed for mike to push to the gh-pages branch

jobs:
  deploy:
    name: Build & deploy docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history required by mike)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # mike needs the full git history to manage versions

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Configure git (required for mike to commit to gh-pages)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Tag push → versioned release docs ────────────────────────────────────
      - name: Deploy versioned docs (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(uv run python -c \
            "import sys; sys.path.insert(0,'src/plotviz'); \
             from config._version import __version__; print(__version__)")
          uv run mike deploy --push --update-aliases "$VERSION" stable
          uv run mike set-default --push stable

      # ── Push to main → "latest" alias (dev / unreleased docs) ────────────────
      - name: Deploy latest docs (main branch push)
        if: github.ref == 'refs/heads/main'
        run: |
          uv run mike deploy --push --update-aliases latest
